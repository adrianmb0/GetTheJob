<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<title>{{NAME}} — CV</title>
<style>
  @page { size: letter; margin: 0.42in 0.55in; }
  * { box-sizing: border-box; }
  body { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 9.5pt; line-height: 1.28; color: #000; margin: 0; }
  .name { text-align: center; font-size: 20pt; font-weight: 700; letter-spacing: 0.02em; margin: 0 0 2px 0; }
  .contact { text-align: center; font-size: 9pt; margin-bottom: 4px; }
  .summary { font-size: 9pt; margin: 0 0 4px 0; text-align: left; line-height: 1.28; }
  h2.section { font-size: 10.5pt; font-weight: 700; margin: 3px 0 0 0; padding-bottom: 0; border-bottom: 0.6pt solid #000; }
  .entry { margin: 1px 0; }
  .entry-head { display: flex; justify-content: space-between; align-items: baseline; font-size: 9.5pt; }
  .entry-head .left { font-weight: 700; }
  .entry-head .left .role { font-weight: 400; font-style: italic; }
  .entry-head .right { font-weight: 400; }
  .entry-sub { display: flex; justify-content: space-between; font-size: 9pt; }
  ul.bullets { margin: 1px 0; padding-left: 0; list-style: none; }
  ul.bullets li { margin: 0; font-size: 9pt; line-height: 1.25; padding-left: 11px; position: relative; }
  ul.bullets li::before { content: "•"; position: absolute; left: 2px; top: 0; font-size: 9pt; }
  .skills p, .honors p { margin: 0; font-size: 9pt; line-height: 1.30; }
  .skills b, .honors b { font-weight: 700; }
  .honors-row { display: flex; justify-content: space-between; font-size: 9pt; }
  a { color: #000; text-decoration: none; }
</style>
</head>
<body>

<!--
  Generic CV template. The /get-the-job pdf flow fills every {{PLACEHOLDER}} from
  the candidate's own cv.md and config/profile.yml — there is NO hardcoded
  personal data here. Each section's content placeholder ({{EXPERIENCE}},
  {{EDUCATION}}, etc.) is a block of one or more `.entry` elements. Entry markup:

    <div class="entry">
      <div class="entry-head">
        <div class="left">Company / Org, <span class="role">Title</span></div>
        <div class="right">Start &ndash; End</div>
      </div>
      <ul class="bullets"><li>Achievement bullet.</li><li>Another bullet.</li></ul>
    </div>

  Omit a section entirely (its <h2> too) if the candidate has nothing for it.
-->

<div class="name">{{NAME}}</div>
<div class="contact">{{EMAIL}} | {{PHONE}} | {{PORTFOLIO_DISPLAY}} | {{LINKEDIN_DISPLAY}}</div>
<div class="summary">{{SUMMARY_TEXT}}</div>

<h2 class="section">{{SECTION_EXPERIENCE}}</h2>
{{EXPERIENCE}}

<h2 class="section">{{SECTION_PROJECTS}}</h2>
{{PROJECTS}}

<h2 class="section">{{SECTION_EDUCATION}}</h2>
{{EDUCATION}}

<h2 class="section">{{SECTION_SKILLS}}</h2>
<div class="skills">{{SKILLS}}</div>

</body>
</html>
